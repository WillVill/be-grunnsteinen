name: Deploy to Elastic Beanstalk

on:
  push:
    branches: [main]
  workflow_dispatch:  # allows manual triggering

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # If you have a build step (Node, Python, etc.), do it here
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Enable Corepack
        run: corepack enable

      - run: yarn install --immutable
      - run: yarn build

      - name: Prune to production dependencies
        run: yarn workspaces focus --all --production

      - name: Strip packageManager field from shipped package.json
        run: |
          node -e "const fs=require('fs');const p=JSON.parse(fs.readFileSync('package.json'));delete p.packageManager;fs.writeFileSync('package.json',JSON.stringify(p,null,2))"

      # Package only what EB needs. node_modules is included so EB skips install.
      - name: Create deployment package
        run: |
          zip -r deploy.zip . \
            -x "*.git*" \
            -x "test/*" \
            -x ".github/*" \
            -x ".yarn/*" \
            -x "src/*" \
            -x "scripts/*" \
            -x "coverage/*" \
            -x "*.md"

      - name: Deploy to Elastic Beanstalk
        uses: einaregilsson/beanstalk-deploy@v22
        with:
          aws_access_key: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws_secret_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          application_name: prod_be_grunnsteien
          environment_name: Prodbegrunnsteien-env
          version_label: ${{ github.sha }}
          region: eu-north-1
          deployment_package: deploy.zip
          wait_for_deployment: true